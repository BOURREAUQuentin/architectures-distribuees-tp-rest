openapi: 3.0.3
info:
  title: Schedule Service API
  description: >
    API Flask pour gérer les plannings de films, avec vérification admin via le service User
    et récupération des détails de films via le service Movie.
  version: 1.0.0
servers:
  - url: http://localhost:3202
    description: Local Schedule Service

paths:
  /{user_id}/schedule/json:
    get:
      summary: Obtenir tout le planning
      description: Retourne le planning complet. Accès admin requis.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "chris_rivers"
      responses:
        '200':
          description: Planning complet
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleEntry'
        '401':
          description: Impossible de vérifier l’utilisateur
        '403':
          description: Accès refusé — admin requis
        '503':
          description: Service User injoignable

  /{user_id}/schedule/{date}:
    get:
      summary: Obtenir les films pour une date spécifique
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "dwight_schrute"
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
          example: "2025-10-15"
      responses:
        '200':
          description: Liste d'IDs de films
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '403':
          description: Accès refusé — admin requis
        '500':
          description: Aucun film trouvé pour cette date

  /{user_id}/schedule/{date}/details:
    get:
      summary: Obtenir les détails des films pour une date spécifique
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "dwight_schrute"
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
          example: "2025-10-15"
      responses:
        '200':
          description: Détails des films pour la date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleDateDetails'
        '403':
          description: Accès refusé — admin requis
        '404':
          description: Date introuvable

  /{user_id}/schedule/by_movie:
    get:
      summary: Obtenir les dates d’un film par ID
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "chris_rivers"
        - name: id
          in: query
          required: true
          schema:
            type: string
          example: "720d006c-3a57-4b6a-b18f-9b713b073f3c"
      responses:
        '200':
          description: Dates où le film est programmé
          content:
            application/json:
              schema:
                type: object
                properties:
                  movie_id:
                    type: string
                  dates:
                    type: array
                    items:
                      type: string
              example:
                movie_id: "720d006c-3a57-4b6a-b18f-9b713b073f3c"
                dates: ["2025-10-15", "2025-10-16"]
        '403':
          description: Accès refusé — admin requis
        '404':
          description: Aucun planning trouvé pour ce film

  /{user_id}/schedule/{date_id}:
    post:
      summary: Ajouter une nouvelle date de planning
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                movies:
                  type: array
                  items:
                    type: string
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: date_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Date ajoutée
        '403':
          description: Accès refusé — admin requis
        '500':
          description: Date existante

    delete:
      summary: Supprimer une date complète
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: date_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Date supprimée
        '403':
          description: Accès refusé — admin requis
        '404':
          description: Date introuvable

  /{user_id}/schedule/{date}/movies:
    post:
      summary: Ajouter un film à une date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                movie_id:
                  type: string
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: date
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Film ajouté
        '403':
          description: Accès refusé — admin requis
        '400':
          description: movie_id manquant
        '500':
          description: Film déjà programmé pour cette date

  /{user_id}/schedule/{date_id}/movies/{movie_id}:
    delete:
      summary: Supprimer un film d’une date spécifique
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: date_id
          in: path
          required: true
          schema:
            type: string
        - name: movie_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Film supprimé de la date
        '403':
          description: Accès refusé — admin requis
        '404':
          description: Film ou date introuvable

  /{user_id}/schedule/movies/{movie_id}:
    delete:
      summary: Supprimer un film de toutes les dates
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: movie_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Film supprimé de toutes les dates
        '403':
          description: Accès refusé — admin requis
        '404':
          description: Film non trouvé dans le planning

components:
  schemas:
    ScheduleEntry:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2025-10-15"
        movies:
          type: array
          items:
            type: string
          example: ["720d006c-3a57-4b6a-b18f-9b713b073f3c", "c4d7f23a-5e2a-4a8e-9d4f-6f1e4b2f8e1b"]

    MovieDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        rating:
          type: number
          format: float
      required:
        - id
        - title
        - rating

    ScheduleDateDetails:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2025-10-15"
        movies:
          type: array
          items:
            $ref: '#/components/schemas/MovieDetail'
