openapi: 3.0.3
info:
  title: Movie Service API
  description: >
    API Flask pour gérer des films avec vérification d’administration via le microservice User.
  version: 1.0.0
servers:
  - url: http://localhost:3200
    description: Local Movie Service

paths:
  /:
    get:
      summary: Page d’accueil
      description: Retourne un message HTML de bienvenue.
      responses:
        '200':
          description: Message de bienvenue (HTML)
          examples:
            html-example:
              value: "<h1 style='color:blue'>Welcome to the Movie service!</h1>"

  /{user_id}/movies/json:
    get:
      summary: Obtenir tous les films
      description: Retourne tous les films au format JSON. Vérification admin requise.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "chris_rivers"
      responses:
        '200':
          description: Liste des films
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Movie'
              example:
                - title: "The Good Dinosaur"
                  rating: 7.4
                  director: "Peter Sohn"
                  id: "720d006c-3a57-4b6a-b18f-9b713b073f3c"
        '401':
          description: Impossible de vérifier l’utilisateur
        '503':
          description: Service User injoignable

  /{user_id}/movies/{movie_id}:
    get:
      summary: Obtenir un film par ID
      description: Retourne le film correspondant à l’ID fourni.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "dwight_schrute"
        - name: movie_id
          in: path
          required: true
          schema:
            type: string
          example: "720d006c-3a57-4b6a-b18f-9b713b073f3c"
      responses:
        '200':
          description: Film trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
              example:
                title: "The Good Dinosaur"
                rating: 7.4
                director: "Peter Sohn"
                id: "720d006c-3a57-4b6a-b18f-9b713b073f3c"
        '401':
          description: Impossible de vérifier l’utilisateur
        '500':
          description: ID de film introuvable
        '503':
          description: Service User injoignable

    post:
      summary: Ajouter un nouveau film
      description: Ajoute un film. Réservé aux administrateurs.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "chris_rivers"
        - name: movie_id
          in: path
          required: true
          schema:
            type: string
          example: "xxxx"
      requestBody:
        description: Détails du film à ajouter
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Movie'
            example:
              title: "Test"
              rating: 1.2
              director: "Someone"
              id: "xxx"
      responses:
        '200':
          description: Film ajouté
        '403':
          description: Accès refusé — administrateur requis
        '500':
          description: L’ID du film existe déjà
        '503':
          description: Service User injoignable

    delete:
      summary: Supprimer un film
      description: Supprime un film existant. Réservé aux administrateurs.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "dwight_schrute"
        - name: movie_id
          in: path
          required: true
          schema:
            type: string
          example: "xxx"
      responses:
        '200':
          description: Film supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
              example:
                title: "Test"
                rating: 1.2
                director: "Someone"
                id: "xxx"
        '403':
          description: Accès refusé — administrateur requis
        '500':
          description: ID de film introuvable

  /{user_id}/movies/{movie_id}/{rate}:
    put:
      summary: Modifier la note d’un film
      description: Met à jour la note d’un film existant.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "chris_rivers"
        - name: movie_id
          in: path
          required: true
          schema:
            type: string
          example: "720d006c-3a57-4b6a-b18f-9b713b073f3c"
        - name: rate
          in: path
          required: true
          schema:
            type: number
          example: 9.1
      responses:
        '200':
          description: Film mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
              example:
                title: "The Good Dinosaur"
                rating: 9.1
                director: "Peter Sohn"
                id: "720d006c-3a57-4b6a-b18f-9b713b073f3c"
        '500':
          description: ID de film introuvable

  /{user_id}/movies/by_title:
    get:
      summary: Obtenir un film par titre
      description: Recherche un film selon son titre.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "dwight_schrute"
        - name: title
          in: query
          required: true
          schema:
            type: string
          example: "The Martian"
      responses:
        '200':
          description: Film trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
              example:
                title: "The Martian"
                rating: 8.2
                director: "Ridley Scott"
                id: "a8034f44-aee4-44cf-b32c-74cf452aaaae"
        '500':
          description: Titre introuvable

components:
  schemas:
    Movie:
      type: object
      properties:
        id:
          type: string
          example: "720d006c-3a57-4b6a-b18f-9b713b073f3c"
        title:
          type: string
          example: "The Good Dinosaur"
        rating:
          type: number
          example: 7.4
        director:
          type: string
          example: "Peter Sohn"
      required:
        - id
        - title
