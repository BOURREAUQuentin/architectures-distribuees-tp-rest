openapi: 3.0.3
info:
  title: User Service API
  description: >
    API Flask pour gérer des utilisateurs avec vérification admin et intégration avec le service Booking.
  version: 1.0.0
servers:
  - url: http://localhost:3201
    description: Local User Service

paths:
  /users/{user_id}/is_admin:
    get:
      summary: Vérifier si un utilisateur est admin
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "chris_rivers"
      responses:
        '200':
          description: Statut admin retourné
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  is_admin:
                    type: boolean
              example:
                id: "chris_rivers"
                is_admin: true
        '404':
          description: Utilisateur introuvable

  /{user_id}/users/json:
    get:
      summary: Obtenir tous les utilisateurs
      description: Retourne tous les utilisateurs en JSON. Accès admin requis.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "dwight_schrute"
      responses:
        '200':
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              example:
                - id: "chris_rivers"
                  name: "Chris Rivers"
                  is_admin: true
                - id: "dwight_schrute"
                  name: "Dwight Schrute"
                  is_admin: true
        '401':
          description: Impossible de vérifier l’utilisateur
        '403':
          description: Accès refusé — admin requis
        '503':
          description: Service User injoignable

  /{user_id}/users/{user_id_wanted}:
    get:
      summary: Obtenir un utilisateur par ID
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "chris_rivers"
        - name: user_id_wanted
          in: path
          required: true
          schema:
            type: string
          example: "dwight_schrute"
      responses:
        '200':
          description: Utilisateur trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: "dwight_schrute"
                name: "Dwight Schrute"
                is_admin: true
        '403':
          description: Accès refusé — admin requis
        '404':
          description: Utilisateur introuvable

    post:
      summary: Ajouter un nouvel utilisateur
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "dwight_schrute"
        - name: user_id_wanted
          in: path
          required: true
          schema:
            type: string
          example: "new_admin"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
            example:
              id: "new_admin"
              name: "New Admin"
              is_admin: true
      responses:
        '200':
          description: Utilisateur ajouté
        '403':
          description: Accès refusé — admin requis
        '500':
          description: ID déjà existant

    delete:
      summary: Supprimer un utilisateur
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "chris_rivers"
        - name: user_id_wanted
          in: path
          required: true
          schema:
            type: string
          example: "new_admin"
      responses:
        '200':
          description: Utilisateur supprimé
        '403':
          description: Accès refusé — admin requis
        '500':
          description: ID introuvable

  /{user_id}/users/{user_id_wanted}/{name}:
    put:
      summary: Modifier le nom d’un utilisateur
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "dwight_schrute"
        - name: user_id_wanted
          in: path
          required: true
          schema:
            type: string
          example: "jim_halpert"
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: "Admin Updated"
      responses:
        '200':
          description: Nom utilisateur mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: "new_admin"
                name: "Admin Updated"
                is_admin: true
        '403':
          description: Accès refusé — admin requis
        '500':
          description: ID introuvable

  /{user_id}/users/by_name:
    get:
      summary: Obtenir un utilisateur par nom
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "chris_rivers"
        - name: name
          in: query
          required: true
          schema:
            type: string
          example: "Dwight Schrute"
      responses:
        '200':
          description: Utilisateur trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: "dwight_schrute"
                name: "Dwight Schrute"
                is_admin: true
        '403':
          description: Accès refusé — admin requis
        '500':
          description: Nom introuvable

  /{user_id}/users/bookings:
    get:
      summary: Obtenir les utilisateurs ayant réservé un film
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "chris_rivers"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  format: date
                  example: "2025-10-15"
                movie:
                  type: string
                  example: "720d006c-3a57-4b6a-b18f-9b713b073f3c"
      responses:
        '200':
          description: Liste des noms des utilisateurs
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: string
              example:
                users: ["Dwight Schrute", "Chris Rivers"]
        '403':
          description: Accès refusé — admin requis
        '404':
          description: L’utilisateur n’existe pas

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: "dwight_schrute"
        name:
          type: string
          example: "Dwight Schrute"
        is_admin:
          type: boolean
          example: true
      required:
        - id
        - name
